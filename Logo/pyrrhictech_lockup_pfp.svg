<svg viewBox="0 0 240 80" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Share+Tech+Mono');
  </style>
</defs>
<rect width="240" height="80" fill="black"/>
  <g id="icon" transform="translate(0,0)">
        <!-- Geometric crystal form suggesting metal grain/steel structure -->
     <polygon points="40,4 72,22 72,58 40,76 8,58 8,22" fill="none" stroke="#b87333" stroke-width="1.5"/>
     <polygon points="40,16 62,28 62,52 40,64 18,52 18,28" fill="none" stroke="#b87333" stroke-width="1" opacity="0.5"/>
      <!-- Inner spark -->
     <polygon points="40,26 52,33 52,47 40,54 28,47 28,33" fill="#b87333" opacity="0.3"/>
        <!-- Center ember dot -->
     <circle cx="40" cy="40" r="4" fill="#e8891a" class="ember-dot"/>
        <!-- Grain lines suggesting forged structure -->
     <line x1="40" y1="40" x2="40" y2="76" stroke="#b87333" stroke-width="1" opacity="0.8"/>
     <line x1="8" y1="22" x2="40" y2="40" stroke="#b87333" stroke-width="1" opacity="0.8"/>
     <line x1="72" y1="22" x2="40" y2="40" stroke="#b87333" stroke-width="1" opacity="0.8"/> 
    </g>
    <!-- vertical devider line -->
    <line x1="80" y1="10" x2="80" y2="70" 
        stroke="#b87333" 
        stroke-width="1.45" 
        opacity="0.85"/>
    <!-- horizontal devider line -->
    <line x1="80" y1="40" x2="230" y2="40" 
        stroke="#b87333" 
        stroke-width="1" 
        opacity="0.70"/>
  <g id="wordmark">
    <text x="85" y="35" font-family="'Bebas Neue', sans-serif"
        font-size="22"
        letter-spacing="6"
        font-weight="700"
        fill="white">
        PYRRHIC
    </text>
    <text x="85" y="56" font-family="'Share Tech Mono', monospace"
        font-size="12"
        letter-spacing="4"
        font-weight="300"
        fill="#b87333">
        TECH
    </text>
  </g>      
</svg>